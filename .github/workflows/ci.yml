# .github/workflows/ci.yml
name: Paysmart CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    name: Lint & Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: ⚙️ Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: 🔐 Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "Missing secret GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > app/google-services.json

      - name: 🔎 Android Lint
        run: >
          ./gradlew :app:lintDebug
          --no-daemon
          --no-configuration-cache
          --max-workers=2
          -Dorg.gradle.vfs.watch=false
          -Dorg.gradle.daemon.performance.disable-logging=true
          "-Dorg.gradle.jvmargs=-Xmx6g -Xms2g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2g"

  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: ⚙️ Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: 🔐 Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "Missing secret GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > app/google-services.json

      - name: 🤖 Build Project (Gradle)
        run: >
          ./gradlew clean :app:compileDebugKotlin
          --no-daemon
          --no-configuration-cache
          --max-workers=2
          -Dorg.gradle.vfs.watch=false
          -Dorg.gradle.daemon.performance.disable-logging=true
          "-Dorg.gradle.jvmargs=-Xmx6g -Xms2g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2g"

      - name: ✅ Run Unit Tests
        run: >
          ./gradlew :app:testDebugUnitTest
          --no-daemon
          --no-configuration-cache
          --max-workers=2
          -Dorg.gradle.vfs.watch=false
          -Dorg.gradle.daemon.performance.disable-logging=true
          "-Dorg.gradle.jvmargs=-Xmx6g -Xms2g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2g"

      - name: 🛡️ Verify Release R8 Shrinking
        run: >
          ./gradlew :app:minifyReleaseWithR8
          --no-daemon
          --no-configuration-cache
          --max-workers=1
          -Dorg.gradle.vfs.watch=false
          -Dorg.gradle.daemon.performance.disable-logging=true
          "-Dorg.gradle.jvmargs=-Xmx6g -Xms2g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2g"
